<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" fill="none">
  <!-- 
    Logo Prime Veículos - Versão de Fidelidade Absoluta (v4)
    Refinamentos:
    - Curvas com extremidades afinadas (needle-point)
    - Barbatana (fin) da curva inferior com drop vertical agressivo
    - Tipografia estendida horizontalmente (Extended Black) via textLength
  -->
  
  <!-- Top Red Swoosh (Roofline) - Tapered starts, bold peak -->
  <path 
    d="M20,72 C50,65 120,10 250,10 C380,10 450,65 480,72 C470,72 420,28 250,28 C80,28 30,72 20,72 Z" 
    fill="#E30613" 
  />
  
  <!-- Bottom Red Swoosh (Bodyline & Fin) - Sharp fin drop at 460,95 -->
  <path 
    d="M100,78 C170,68 270,64 350,64 C430,64 470,72 490,82 C500,95 504,125 504,152 C504,158 497,158 492,142 C475,115 380,104 250,104 C120,104 100,78 100,78 Z" 
    fill="#E30613" 
  />
  
  <!-- PRIME VEÍCULOS Text (Extended Black Style) -->
  <text 
    x="250" 
    y="148" 
    text-anchor="middle" 
    font-family="'Arial Black', 'Helvetica Black', sans-serif" 
    font-size="26" 
    font-weight="900" 
    textLength="380" 
    lengthAdjust="spacingAndGlyphs"
    fill="#171717"
  >PRIME VEÍCULOS</text>
</svg>
